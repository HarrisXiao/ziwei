name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
      HAS_DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Run backend smoke test
        run: npm test
        working-directory: backend

      - name: Deploy over SSH
        if: ${{ env.DEPLOY_HOST != '' && env.HAS_DEPLOY_SSH_KEY == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          port: ${{ env.DEPLOY_PORT }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -eu
            if [ ! -d /opt/ziwei/.git ]; then
              git clone https://github.com/HarrisXiao/ziwei.git /opt/ziwei
            fi
            cd /opt/ziwei
            git fetch origin main
            git merge --ff-only origin/main
            bash deploy/deploy-backend.sh

      - name: Skip deploy notice
        if: ${{ env.DEPLOY_HOST == '' || env.HAS_DEPLOY_SSH_KEY != 'true' }}
        run: echo "DEPLOY_HOST or DEPLOY_SSH_KEY is not configured; tests passed and deployment was skipped."
