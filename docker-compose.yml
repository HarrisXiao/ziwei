services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ziwei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ziwei_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-ziwei}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ziwei_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      DATA_FILE: /app/data/store.json
      DATABASE_URL: postgres://${POSTGRES_USER:-ziwei}:${POSTGRES_PASSWORD:-ziwei_local_password}@db:5432/${POSTGRES_DB:-ziwei}
    volumes:
      - ./backend/data:/app/data

volumes:
  ziwei_pgdata:
